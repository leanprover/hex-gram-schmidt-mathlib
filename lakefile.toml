name = "hex-gram-schmidt-mathlib"
defaultTargets = ["HexGramSchmidtMathlib"]

# Keep these Hex pins in sync with their source repos: Lake does not reconcile
# a package pinned at two points in the graph, so bump them together.
[[require]]
name = "HexBasic"
git = "https://github.com/leanprover/hex-basic.git"
rev = "f1580d28c2e9ff9e8d4d7cdef9dccbaa17780b03"

[[require]]
name = "HexGramSchmidt"
git = "https://github.com/leanprover/hex-gram-schmidt.git"
rev = "6bae0c6ed6c19c44956dc69eb31487fc3596f01d"

[[require]]
name = "HexBareissMathlib"
git = "https://github.com/leanprover/hex-bareiss-mathlib.git"
rev = "2ef209e76b27450d272944609bc8ad85a756652e"

[[require]]
name = "HexDeterminantMathlib"
git = "https://github.com/leanprover/hex-determinant-mathlib.git"
rev = "e5d646df54cbe693a2c8deb094770dd977875a7b"

[[require]]
name = "HexMatrixMathlib"
git = "https://github.com/leanprover/hex-matrix-mathlib.git"
rev = "be15f40e4942fe78ed28f037c9407a94bc3c10ce"

[[require]]
name = "HexRowReduce"
git = "https://github.com/leanprover/hex-row-reduce.git"
rev = "a5b4db02cadc7a1e60e2ae7e085cb6facf415ee0"

[[require]]
name = "HexDeterminant"
git = "https://github.com/leanprover/hex-determinant.git"
rev = "20f5785e9c85e9faa481d6b67c1382b6655b842e"

[[require]]
name = "HexBareiss"
git = "https://github.com/leanprover/hex-bareiss.git"
rev = "0317e62974acadbb68caf1f57defcc90cfe80b99"

[[require]]
name = "HexMatrix"
git = "https://github.com/leanprover/hex-matrix.git"
rev = "d45bf749d6283726b8df43b5be9e6dde350666d6"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.32.0-rc1-patch1"

[[lean_lib]]
name = "HexGramSchmidtMathlib"
